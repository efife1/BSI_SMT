<!doctype html><html><head><style>body{margin:0;background:#08101c;color:#eef4fb;font-family:system-ui}header{padding:18px 24px;background:#111d2b;border-bottom:1px solid #2b3b50;display:flex;align-items:center;gap:15px}header img{width:56px;border-radius:12px}main{padding:24px;max-width:1200px;margin:auto}.card{background:#111d2b;border:1px solid #2b3b50;border-radius:14px;padding:18px;margin-bottom:18px}a,button{color:white;background:#e63323;border:0;border-radius:8px;padding:9px 14px;text-decoration:none;font-weight:700}input,select,textarea{background:#0b1624;color:white;border:1px solid #40536b;border-radius:6px;padding:7px}table{border-collapse:collapse;width:100%;font-size:13px}th,td{border:1px solid #304157;padding:6px}th{background:#17263a}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.stat{font-size:2rem;font-weight:800}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}}</style></head><body><header><img src="/static/bsi-smt-dashboard-icon-256.png"><h1>BSI SMT</h1><a href="/import">Import</a><a href="/events">Events</a><a href="/analytics">RT2 Analytics</a><a href="/equipment">Equipment</a><a href="/root-cause">Root Cause</a><a href="/offenders">Recurring Offenders</a></header><main><div class=grid><div class=card><div>Observations</div><div class=stat>{{s.observations}}</div></div><div class=card><div>Events</div><div class=stat>{{s.events}}</div></div><div class=card><div>Average RT2</div><div class=stat>{{s.avg_rt2 or 0}}%</div></div><div class=card><div>Failures &lt;95%</div><div class=stat>{{s.failures_below_95}}</div></div></div></main></body></html>
