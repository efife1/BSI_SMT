<!doctype html><html><head><style>body{margin:0;background:#08101c;color:#eef4fb;font-family:system-ui}header{padding:18px 24px;background:#111d2b;border-bottom:1px solid #2b3b50;display:flex;align-items:center;gap:15px}header img{width:56px;border-radius:12px}main{padding:24px;max-width:1200px;margin:auto}.card{background:#111d2b;border:1px solid #2b3b50;border-radius:14px;padding:18px;margin-bottom:18px}a,button{color:white;background:#e63323;border:0;border-radius:8px;padding:9px 14px;text-decoration:none;font-weight:700}input,select,textarea{background:#0b1624;color:white;border:1px solid #40536b;border-radius:6px;padding:7px}table{border-collapse:collapse;width:100%;font-size:13px}th,td{border:1px solid #304157;padding:6px}th{background:#17263a}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.stat{font-size:2rem;font-weight:800}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}}</style></head><body><header><h1>{{event.series}} · {{event.track}} · {{event.race_date}}</h1><a href="/events">Events</a></header><main><div class=card style="overflow:auto"><table><tr><th>Car</th><th>Team</th><th>Vector</th><th>RT2</th><th>Notes</th><th colspan=8>Four Camera Assignments</th><th>Save</th></tr>{% for r in rows %}<tr data-id="{{r.id}}"><td><input value="{{r.car_number or ''}}"></td><td><input value="{{r.team or ''}}"></td><td><input value="{{r.vector or ''}}"></td><td><input value="{{r.rt2_tracking or ''}}"></td><td><input value="{{r.notes or ''}}"></td>{% for n in range(1,5) %}{% set a=(r.assignments|selectattr('slot_number','equalto',n)|list|first) %}<td><input placeholder="Serial {{n}}" value="{{a.camera_serial if a else ''}}"></td><td><input placeholder="Position {{n}}" value="{{a.camera_position if a else ''}}"></td>{% endfor %}<td><button onclick=save(this)>Save</button></td></tr>{% endfor %}</table></div></main><script>async function save(b){let tr=b.closest('tr'),e=[...tr.querySelectorAll('input')],id=tr.dataset.id;await fetch('/api/observations/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({car_number:e[0].value,team:e[1].value,vector:e[2].value,rt2_tracking:e[3].value,notes:e[4].value})});let k=5;for(let s=1;s<=4;s++)await fetch('/api/observations/'+id+'/camera/'+s,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({camera_serial:e[k++].value,camera_position:e[k++].value})});b.textContent='Saved';setTimeout(()=>b.textContent='Save',1000)}</script></body></html>
