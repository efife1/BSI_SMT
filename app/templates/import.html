<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><style>
body{margin:0;background:#08101c;color:#eef4fb;font-family:system-ui}header{padding:18px 24px;background:#111d2b;border-bottom:1px solid #2b3b50;display:flex;align-items:center;gap:15px;flex-wrap:wrap}header img{width:56px;border-radius:12px}main{padding:24px;max-width:1200px;margin:auto}.card{background:#111d2b;border:1px solid #2b3b50;border-radius:14px;padding:18px;margin-bottom:18px}a,button{color:white;background:#e63323;border:0;border-radius:8px;padding:9px 14px;text-decoration:none;font-weight:700;cursor:pointer}.secondary{background:#2b4058}input{background:#0b1624;color:white;border:1px solid #40536b;border-radius:6px;padding:10px}table{border-collapse:collapse;width:100%;font-size:13px}th,td{border:1px solid #304157;padding:7px;text-align:left}th{background:#17263a}.drop{border:2px dashed #4a617d;border-radius:12px;padding:34px;text-align:center}.muted{color:#9fb0c3}.ok{color:#46d27d}.bad{color:#ff6b5f}.warn{color:#ffbd3d}
</style><title>Batch PDF Import — NCS / NCTS / NOAPS detected from filename</title></head><body><header><img src="/static/bsi-smt-dashboard-icon-256.png"><h1>Batch PDF Import — NCS / NCTS / NOAPS detected from filename</h1><a href="/">Dashboard</a><a class="secondary" href="/analytics">RT2 Analytics</a><a class="secondary" href="/root-cause">Root Cause</a></header><main>
<div class="card drop"><h2>Select one or more tracking-report PDFs</h2><input id="files" type="file" accept=".pdf" multiple><p id="selected" class="muted">No files selected.</p><label><input id="auto" type="checkbox" checked> Automatically run statistical analysis after each import</label><br><br><button onclick="runBatch()">Import selected PDFs</button></div>
<div class="card"><h2>Batch results</h2><div id="summary" class="muted">Results will appear here.</div><table><thead><tr><th>File</th><th>Status</th><th>Rows</th><th>Event</th><th>Analysis</th><th>Message</th></tr></thead><tbody id="results"></tbody></table></div>
<script>
files.addEventListener('change',()=>selected.textContent=files.files.length?`${files.files.length} PDF file(s) selected.`:'No files selected.');
function esc(v){return String(v??'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));}
async function runBatch(){if(!files.files.length){alert('Select at least one PDF.');return;}let d=new FormData();for(const f of files.files)d.append('files',f);d.append('auto_analyze',auto.checked?'true':'false');summary.textContent='Uploading and analyzing...';results.innerHTML='';try{let r=await fetch('/api/import/batch',{method:'POST',body:d});let j=await r.json();if(!r.ok)throw new Error(j.detail||'Import failed');summary.innerHTML=`Imported <b>${j.imported}</b>; duplicates <b>${j.duplicates}</b>; failed <b>${j.failed}</b>.`;for(const x of j.results){let cls=x.status==='complete'?'ok':x.status==='duplicate'?'warn':'bad';results.insertAdjacentHTML('beforeend',`<tr><td>${esc(x.filename)}</td><td class="${cls}">${esc(x.status)}</td><td>${esc(x.rows_inserted)}</td><td>${x.event_id?`<a href="/events/${x.event_id}">${x.event_id}</a>`:''}</td><td>${x.analysis_run_id?`Run ${x.analysis_run_id}`:''}</td><td>${esc(x.message)}</td></tr>`);}}catch(e){summary.innerHTML=`<span class="bad">${esc(e.message)}</span>`;}}
</script></main></body></html>
