<html><head><style>body{margin:0;background:#08101c;color:#eef4fb;font-family:system-ui}header{padding:18px;background:#111d2b;display:flex;gap:12px;align-items:center;flex-wrap:wrap}main{padding:22px;max-width:1400px;margin:auto}.card{background:#111d2b;border:1px solid #2b3b50;border-radius:12px;padding:16px;margin-bottom:16px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}.stat{font-size:2rem;font-weight:800}.muted{color:#9fb0c3}a,button{color:white;background:#e63323;border:0;border-radius:7px;padding:8px 12px;text-decoration:none;font-weight:700}input,select{background:#0b1624;color:white;border:1px solid #40536b;padding:7px}table{border-collapse:collapse;width:100%;font-size:13px}th,td{border:1px solid #304157;padding:6px}th{background:#17263a}.bad{color:#ff6b5f}.warn{color:#ffbd3d}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}.two{grid-template-columns:1fr}}</style><title>Equipment</title></head><body><header><h1>Equipment Analysis</h1><a href="/">Dashboard</a><a href="/analytics">RT2 Analytics</a><a href="/root-cause">Root Cause</a></header><main><form class=card>Group <select name=group>{% for g in ['vector','car_number','camera_serial','camera_position','track','series'] %}<option value="{{g}}" {% if group==g %}selected{% endif %}>{{g}}</option>{% endfor %}</select> Minimum samples <input name=minimum_samples value="{{minimum_samples}}"><button>Analyze</button></form><div class=card><table><tr><th>Item</th><th>N</th><th>Average RT2</th><th>Worst</th><th>Failure %</th></tr>{% for x in rows %}<tr><td>{{x.label}}</td><td>{{x.samples}}</td><td>{{x.avg_rt2}}</td><td>{{x.worst_rt2}}</td><td>{{x.failure_rate}}</td></tr>{% endfor %}</table></div></main></body></html>
